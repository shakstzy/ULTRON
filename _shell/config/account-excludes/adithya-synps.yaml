# Account-level exclude clauses for adithya@synps.xyz
# Applied post-fetch by route.py. Referenced from any sources.yaml that
# subscribes this account via `accounts[].api_query.exclude_from`.
#
# Generated from gmail-schema-adithya-synps.md (Sections 3c, 4, 5, 7, 8).
# Last refreshed: 2026-05-03.
#
# Rule grammar (route.py):
#   - "from:<domain>"            bare domain, matches the domain or any subdomain
#   - "from:*@<domain>"          fnmatch, only that exact domain
#   - "from:<email>"             exact email
#   - "from:*.<tld>"             fnmatch wildcard for TLD heuristic
#   - "subject:\"<phrase>\""     case-insensitive contains
#   - "from:X subject:\"Y\""     compound AND (Gmail-q=-style)
#   - "from:X -subject:\"Y\""    compound AND-NOT (negation)

