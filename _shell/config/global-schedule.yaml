# ULTRON cross-workspace schedule. The schedule skill compiles this into
# launchd plists at _shell/plists/.

# Env vars injected into every cron+daemon plist's EnvironmentVariables block.
# Single source of truth — change here, recompile, reload, every job picks it up.
# `~` expands at compile time (launchd does not auto-expand). Empty values are skipped.
#
# CLAUDE_CONFIG_DIR isolates Claude Code auth for cron-fired jobs from interactive
# sessions. Log in once: `CLAUDE_CONFIG_DIR=~/.claude-cron claude` (one browser
# click). Cron jobs then never starve interactive quota.
#
# DO NOT run `schedule.py compile` under sudo — `~` and Path.home() would expand
# to /var/root and silently shred every plist's HOME/CLAUDE_CONFIG_DIR.
#
# If you add a cron-fired script that hits the Anthropic API via the SDK directly
# (not the `claude` CLI), CLAUDE_CONFIG_DIR is bypassed — you'll need to add
# ANTHROPIC_API_KEY here too, or skip the SDK path for cron.
cron_env:
  CLAUDE_CONFIG_DIR: ~/.claude-cron

cross_workspace:
  graphify_supermerge:
    cron: "0 */6 * * *"             # Every 6 hours
  audit:
    cron: "0 5 * * 0"               # Sundays 05:00
  weekly_review:
    cron: "0 7 * * 0"               # Sundays 07:00
  apple_contacts_sync:
    cron: "0 3 * * *"               # Nightly 03:00
  ledger_compact:
    cron: "0 4 1 */3 *"             # 04:00 on the 1st of every 3rd month
  granola_reconcile:
    cron: "0 3 1,15 * *"            # 03:00 on 1st & 15th (biweekly --reset-cursor sweep, catches Granola folder reclassifications)
  synthesize_voice_profiles:
    cron: "0 4 * * 0"               # Sundays 04:00 — refresh voice_profile + conversation_summary for stale contacts (capped at 20/run)

# Long-running daemons (KeepAlive=true). Compiled to plists with no cron.
daemons:
  whatsapp_bridge:
    # lharries/whatsapp-mcp Go bridge. Maintains the WhatsApp Web websocket
    # session via whatsmeow and persists messages to local SQLite. Required
    # by both _shell/bin/ingest-whatsapp.py (read) and the `whatsapp` skill
    # (send). Pairing code only needed at first run / after auth expiry (~20d).
    command: /Users/shakstzy/.local/bin/whatsapp-bridge
    working_dir: /Users/shakstzy/.local/share/whatsapp-mcp/whatsapp-bridge
    keep_alive: true
    throttle_interval: 30
    env:
      WHATSAPP_PAIR_PHONE: "+15126601911"
