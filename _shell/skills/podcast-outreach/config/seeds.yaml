# Listennotes discovery seeds — fan-out variety for the discover stage.
# seed-cursor.mjs walks this list deterministically, marks visited, wraps
# around when exhausted. Each cron run pulls --seeds N (default 10) starting
# from the cursor, then advances. Reshuffle on full-cycle.
#
# Two kinds of seeds:
#   genre: best-podcasts/<slug> — Listennotes' curated genre boards
#   query: search/?q=<urlencoded> — keyword search for niche/long-tail
#
# Bias toward conversational formats per the licensing-agreement contract
# (dialogue between 2+ speakers, English).

