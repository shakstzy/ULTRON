# clipping — declared ingestion sources
# Cross-source routing rules in _shell/docs/source-routing.md.

workspace: clipping
wiki: true

_workspace_meta:
  ingest_unrouted_default: skip

sources:
  gmail:
    accounts: []   # Populated from source-routing.md (Whop / Vyro receipts).
  manual:
    watch_path: raw/manual/_inbox/
    after_ingest: move_to_dated_subdir
  # yt-dlp captures, mlx-whisper transcripts, anonymous metrics polling
  # land here once each stage's robot is wired.

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
