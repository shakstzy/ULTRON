# dating — declared ingestion sources
# Cross-source routing rules in _shell/docs/source-routing.md.

workspace: dating
wiki: true

_workspace_meta:
  ingest_unrouted_default: skip

sources:
  manual:
    watch_path: raw/manual/_inbox/
    after_ingest: move_to_dated_subdir
  imessage:
    contact_set_label: dating  # Filtered via source-routing.md contact set.
  tinder:
    bot_path: bot/                              # patchright bot, hand-paced
    raw_path: raw/tinder/                       # one .md per match (slug = <first>-tinder-<city>)
    schedule: setup/                            # plists at _shell/plists/com.adithya.ultron.dating-tinder-*
    auto_stub: wiki/entities/people/<slug>.md   # bot creates wiki stubs on every new match
  bumble:
    bot_path: bot-bumble/                       # patchright bot, hand-paced; reply-mostly (Bumble women initiate)
    raw_path: raw/bumble/                       # one .md per match (slug = <first>-bumble-<city>)
    config_path: config/bumble/                 # caps.json, schedule.json, filter.json, selectors.json, cities.json, voice/
    outbound_path: 04-outbound/bumble/          # drafts/pending/approved/sent/expired/auto-sent (auto since 2026-05-04)
    state_home: ~/.ultron/dating/bumble/        # halt, rate-state, sessions.ndjson, deleted/
    schedule: setup/bumble/                     # plists at _shell/plists/com.adithya.ultron.dating-bumble-*
  # hinge: not yet ported.

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
