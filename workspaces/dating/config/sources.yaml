# dating — declared ingestion sources
# Cross-source routing rules in _shell/docs/source-routing.md.

workspace: dating
wiki: true

_workspace_meta:
  ingest_unrouted_default: skip

sources:
  manual:
    watch_path: raw/manual/_inbox/
    after_ingest: move_to_dated_subdir
  imessage:
    contact_set_label: dating  # Filtered via source-routing.md contact set.
  tinder:
    bot_path: bot/                              # patchright bot, hand-paced
    raw_path: raw/tinder/                       # one .md per match (slug = <first>-tinder-<city>)
    schedule: setup/                            # plists at _shell/plists/com.adithya.ultron.dating-tinder-*
    auto_stub: wiki/entities/people/<slug>.md   # bot creates wiki stubs on every new match
  # bumble / hinge: same shape as tinder; bots not yet ported.

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
