# Eclipse — declared launchd cadence. The schedule skill compiles this into
# per-(account,source) ingest plists and per-workspace job plists.

workspace: eclipse

sources:
  gmail:
    cron: "0 8-23 * * *"             # Hourly, waking hours
    accounts:
      - adithya@eclipse.builders
  slack:
    cron: "0 8-23 * * *"
  drive:
    cron: "30 */6 * * *"             # Every 6 hours at :30
    accounts:
      - adithya@eclipse.builders
  granola:
    cron: "15 */4 * * *"             # Every 4 hours at :15 (6x/day, account-global)
    accounts:
      - adithya@outerscope.xyz

workspace_jobs:
  lint:
    cron: "0 4 * * *"                # Daily 04:00
  graphify:
    cron: "0 */6 * * *"              # Every 6 hours

# audit, weekly-review, graphify-supermerge live in _shell/config/global-schedule.yaml.
