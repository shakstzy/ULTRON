# SMOKE-TEST CONFIG — replace with agent-extracted schema before bulk historical ingest.
# Phase 3 starter: only the outerscope account is wired live.

workspace: eclipse
wiki: true

sources:
  gmail:
    accounts:
      - account: adithya@outerscope.xyz
        lookback_days_initial: 365
        api_query:
          include:
            - "label:Eclipse"
            - "from:*@eclipse.audio"
            - "to:*@eclipse.audio"
          exclude:
            - "from:noreply@*"
            - "label:SPAM"
            - "label:TRASH"

  slack: []        # deferred — credentials wired but ingest disabled in Phase 3
  drive: []        # deferred
  manual:
    watch_path: raw/manual/_inbox/
    after_ingest: move_to_dated_subdir

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
