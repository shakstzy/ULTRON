# Eclipse — declared ingestion sources
#
# NOTE: ingest is currently deferred. Sources are declared but ingest scripts
# will skip cleanly (no-op) until credentials are provisioned in
# `_credentials/<source>-eclipse.json`. See _credentials/README.md.

workspace: eclipse
wiki: true

sources:
  - id: gmail-eclipse
    type: gmail
    bin: ingest-gmail.py
    config:
      account: adithya@eclipselabs.example
      labels:
        - "Eclipse"
        - "Inbox"
      exclude_labels:
        - "Promotions"
        - "Spam"
      lookback_days: 1
      lookback_days_initial: 365
    output_path: raw/gmail/{YYYY-MM}/

  - id: slack-eclipse
    type: slack
    bin: ingest-slack.py
    config:
      workspace_id: T0XXXXXX
      channels:
        - "general"
        - "deals"
        - "vendors"
        - "audio-qa"
      include_dms_with:
        - sydney
        - julian
        - kayla
        - emmett
      lookback_hours: 24
    output_path: raw/slack/{YYYY-MM}/

  - id: drive-eclipse
    type: drive
    bin: ingest-drive.py
    config:
      account: adithya@eclipselabs.example
      folders:
        - "Eclipse Labs / Sales"
        - "Eclipse Labs / Vendors"
        - "Eclipse Labs / Internal"
      mime_types:
        - "application/vnd.google-apps.document"
        - "application/pdf"
      lookback_days: 7
    output_path: raw/drive/{YYYY-MM}/

  - id: manual-notes
    type: manual
    config:
      watch_path: raw/manual/_inbox/
      after_ingest: move_to_dated_subdir
    output_path: raw/manual/{YYYY-MM}/

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
