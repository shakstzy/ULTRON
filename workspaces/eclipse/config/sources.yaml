workspace: eclipse
wiki: true

sources:
  gmail:
    accounts:
      - account: adithya@outerscope.xyz
        lookback_days_initial: 365
        api_query:
          include:
            - "label:Eclipse"
            - "from:*@eclipse.audio"
            - "to:*@eclipse.audio"
            - "from:*@eclipse.builders"
            - "to:*@eclipse.builders"
          exclude:
            - "from:noreply@*"
