# Finance — declared ingestion sources

workspace: finance
wiki: true

sources:
  - id: gmail-finance
    type: gmail
    bin: ingest-gmail.py
    config:
      account: adithya.shak.kumar@gmail.com
      labels:
        - "Finance"        # apply this label in Gmail to financial mail
      lookback_days: 1
      lookback_days_initial: 365
    output_path: raw/gmail/{YYYY-MM}/

  - id: plaid-export
    type: manual            # Plaid CSV exports dropped manually for now
    config:
      watch_path: raw/plaid/_inbox/
      after_ingest: move_to_dated_subdir
    output_path: raw/plaid/{YYYY-MM}/

  - id: manual-notes
    type: manual
    config:
      watch_path: raw/manual/_inbox/
      after_ingest: move_to_dated_subdir
    output_path: raw/manual/{YYYY-MM}/

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
