# Health — declared launchd cadence. Sources are mostly manual drops or
# weekly batch (Apple Health export). Cadence reflects that.

workspace: health

sources:
  manual:
    cron: "0 4 * * *"                # Daily 04:00 — pick up overnight inbox drops
  apple-health:
    cron: "0 5 * * 0"                # Sundays 05:00 — pick up weekly export
  gmail:
    cron: "0 6 * * *"                # Daily 06:00 — health-labeled mail only
