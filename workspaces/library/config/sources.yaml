# library — declared ingestion sources
# Cross-source routing rules in _shell/docs/source-routing.md.
# All ingest is on-demand and capture-only. The wiki layer is built
# downstream by `/graphify --wiki workspaces/library`.

workspace: library
wiki: true

_workspace_meta:
  ingest_unrouted_default: skip

sources:
  manual:
    watch_path: raw/manual/_inbox/
    after_ingest: move_to_dated_subdir
    description: |
      Free-form deposits (PDFs, EPUBs, transcripts dropped manually).
      Lint stage routes them to the right raw/<type>/ folder by sniffing
      file extension and content.

  youtube:
    handler: bin/ingest-youtube.py
    accepts:
      - "youtube.com/watch?v=*"
      - "youtu.be/*"
      - "youtube.com/shorts/*"   # only when URL is pasted directly
      - "youtube.com/live/*"
      - "youtube.com/embed/*"
      - "youtube.com/@*"          # channel
      - "youtube.com/c/*"
      - "youtube.com/channel/*"
    skip_shorts_default: true
    backfill_default: all
    notes: |
      Pure capture: yt-dlp metadata + youtube-summary venv transcript →
      raw/youtube/<channel>/<YYYY-MM>/<slug>.md with universal envelope.

  instagram-reel:
    handler: bin/ingest-reel.py
    accepts:
      - "instagram.com/p/*"
      - "instagram.com/reel/*"
      - "instagram.com/reels/*"
      - "instagram.com/tv/*"
      - "instagram.com/share/*"
    notes: |
      Wraps the global instagram-summary skill (which uses cloud-llm for
      visual + audio). Ingest writes raw/reels/<creator>/<YYYY-MM>/<slug>.md
      with caption + transcript + visual sections in the body.

  paper:
    handler: bin/ingest-paper.py
    accepts:
      - "arxiv.org/abs/*"
      - "arxiv.org/pdf/*"
      - "doi.org/*"
      - "*.pdf"
    notes: |
      Pure capture: arxiv API metadata, docling for PDF → markdown,
      raw/papers/<slug>.md alongside <slug>.pdf (gitignored).

  book:
    handler: bin/ingest-book.py
    accepts:
      - title-and-author: "<title>, <author>"
      - "annas-archive.org/md5/*"
      - "*.epub"
      - "*.pdf"
    validation:
      title_fuzzy_match_min: 0.85
      author_fuzzy_match_min: 0.7
      language: en
      format_preference: [epub, pdf]
    notes: |
      Pure capture: Anna's Archive search OR direct URL OR local file →
      pandoc EPUB → markdown → raw/books/<author>/<slug>.md alongside
      <slug>.epub (gitignored).

  article:
    handler: bin/ingest-article.py
    accepts:
      - "http://*"
      - "https://*"
    notes: |
      Pure capture: defuddle (or stdlib heuristic fallback) →
      raw/articles/<YYYY-MM>/<slug>.md.

global_settings:
  attachments_inline: true
  hash_algorithm: blake3
  copyright_posture: takeaways-only
