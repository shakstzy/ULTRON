# onlyfans — declared ingestion sources
# Cross-source routing rules in _shell/docs/source-routing.md.

workspace: onlyfans
wiki: true

_workspace_meta:
  ingest_unrouted_default: skip

sources:
  manual:
    watch_path: raw/manual/_inbox/
    after_ingest: move_to_dated_subdir
  # gmail, browser-driven platform ingest, payments-platform exports
  # added once routing matrix is filled and credentials are provisioned.

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
