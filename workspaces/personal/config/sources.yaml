# SMOKE-TEST CONFIG — replace with agent-extracted schema before bulk historical ingest.
# Phase 3 starter: scoped tight to a 7-day inbox window on the outerscope account
# so a single ingest run lands a meaningful but small sample.

workspace: personal
wiki: true

sources:
  gmail:
    # Documents intent for unrouted threads on this workspace's gmail
    # subscriptions. Currently advisory; route.py reads the per-workspace
    # `_workspace_meta.ingest_unrouted_default` for enforcement.
    unrouted_default: route_to_main
    accounts:
      - account: adithya@outerscope.xyz
        lookback_days_initial: 7
        api_query:
          include:
            - "label:INBOX"
          exclude:
            - "from:noreply@*"
            - "label:Eclipse"
            - "label:SPAM"
            - "label:TRASH"

      # Synapse founder mailbox. Lookback covers the full ~12-month account
      # history. Synapse workspace doesn't exist yet; personal is the
      # holding pen until it's bootstrapped (then flip the account block
      # over). Match-all + exclude_from keeps cold-pitch / promo noise out.
      - account: adithya@synps.xyz
        lookback_days_initial: 365
        api_query:
          include: []          # match-all → every non-excluded thread routes here
          exclude:
            - "label:SPAM"
            - "label:TRASH"
            - "label:DRAFT"
            - "label:CHAT"
            - "label:CATEGORY_PROMOTIONS"
            - "label:CATEGORY_SOCIAL"
          exclude_from: _shell/config/account-excludes/adithya-synps.yaml

  imessage: []     # deferred (skeleton, IMPLEMENTATION_READY=False)
  manual:
    watch_path: raw/manual/_inbox/
    after_ingest: move_to_dated_subdir

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
