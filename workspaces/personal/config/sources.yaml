# SMOKE-TEST CONFIG — replace with agent-extracted schema before bulk historical ingest.
# Phase 3 starter: scoped tight to a 7-day inbox window on the outerscope account
# so a single ingest run lands a meaningful but small sample.

workspace: personal
wiki: true

sources:
  gmail:
    accounts:
      - account: adithya@outerscope.xyz
        lookback_days_initial: 7
        api_query:
          include:
            - "label:INBOX"
          exclude:
            - "from:noreply@*"
            - "label:Eclipse"
            - "label:SPAM"
            - "label:TRASH"

  imessage: []     # deferred (skeleton, IMPLEMENTATION_READY=False)
  manual:
    watch_path: raw/manual/_inbox/
    after_ingest: move_to_dated_subdir

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
