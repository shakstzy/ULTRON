# Seedbox workspace ingest sources.
# Sole source: label:Seedbox from adithya@outerscope.xyz.

workspace: seedbox
wiki: true

sources:
  gmail:
    accounts:
      - account: adithya@outerscope.xyz
        lookback_days_initial: 365
        api_query:
          include:
            - "label:Seedbox"
          exclude:
            - "from:noreply@*"
            - "label:SPAM"
            - "label:TRASH"

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
