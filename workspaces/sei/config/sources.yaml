# sei — declared ingestion sources
# Cross-source routing rules in _shell/docs/source-routing.md.
# Past-job archive workspace; no active ingest cron.

workspace: sei
wiki: true

_workspace_meta:
  ingest_unrouted_default: skip

sources:
  gmail:
    accounts: []   # populated from source-routing.md (TBD label + which mailbox)
  granola:
    folders: []    # TBD: confirm whether a Sei Granola folder exists upstream
  manual:
    watch_path: raw/manual/_inbox/
    after_ingest: move_to_dated_subdir
  # drive / slack from Sei's own workspace would only ingest if credentials are
  # still valid and the access has not been revoked. Declare under TBD rows in
  # _shell/docs/source-routing.md.

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
