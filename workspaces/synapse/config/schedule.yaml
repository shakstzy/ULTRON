# synapse — declared launchd cadence
# Compiled by the `schedule` skill into _shell/plists/.

workspace: synapse

# Per-(source, account) ingest cadences. The schedule skill compiles each
# unique (source, account) declared anywhere into one plist:
#   com.adithya.ultron.ingest-<source>-<account-slug>
# It runs `run-stage.sh ingest-source <source> <account>`, which dispatches to
# `_shell/bin/ingest-<source>.py --account <account>`. If multiple workspaces
# declare different crons for the same (source, account), the most frequent wins.
sources:
  notion:
    # Default account = single Keychain token (service=quantum-notion).
    # Twice-daily catches edits within ~12h while staying gentle on quota.
    cron: "0 6,18 * * *"

# Per-workspace housekeeping (lint + graphify).
workspace_jobs:
  lint:
    cron: "30 4 * * *"
  graphify:
    cron: "0 */6 * * *"

# audit, weekly-review, graphify-supermerge, apple-contacts-sync, ledger-compact
# are cross-workspace; they live in _shell/config/global-schedule.yaml.
