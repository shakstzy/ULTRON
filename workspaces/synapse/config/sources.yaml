# Synapse workspace ingest sources.
# Primary: adithya@synps.xyz (Synapse founder mailbox).
# Secondary: manual notes drop-zone.
#
# The accounts block below is intentionally empty until the per-label routing
# interview is complete. With no accounts entry, the synps mailbox plist
# (when created) will exit early ("no workspace subscribes"). This is the safe
# default — better to ingest nothing than to ingest everything by accident.

workspace: synapse
wiki: true

sources:
  gmail:
    accounts: []   # populated after interview; see gmail-schema-adithya-synps.md

  manual:
    watch_path: raw/manual/_inbox/
    after_ingest: move_to_dated_subdir

  granola:
    folders:
      - SYNAPSE

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
