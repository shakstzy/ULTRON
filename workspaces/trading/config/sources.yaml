# trading — declared ingestion sources
# Cross-source routing rules in _shell/docs/source-routing.md.

workspace: trading
wiki: true

_workspace_meta:
  ingest_unrouted_default: skip

sources:
  manual:
    watch_path: raw/manual/_inbox/
    after_ingest: move_to_dated_subdir
  # exchange CSV exports land in raw/manual/exports/ for now; arbitrage
  # detection cron added once that pattern is ported from SHAKOS.

global_settings:
  attachments_inline: true
  vision_model: sonnet
  hash_algorithm: blake3
